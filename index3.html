<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
}

/* Slideshow container */
.slideshow-container{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* Hide images by default */
.mySlides{
    display:none;
    width:100%;
    height:100%;
}

/* Image full screen */
.mySlides img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Next & previous buttons */
.prev, .next{
    cursor:pointer;
    position:absolute;
    top:50%;
    padding:16px;
    color:white;
    font-weight:bold;
    font-size:24px;
    transition:0.3s;
    user-select:none;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.3);
}

.prev{
    left:10px;
    border-radius:5px;
}

.next{
    right:10px;
    border-radius:5px;
}

.prev:hover, .next:hover{
    background:rgba(0,0,0,0.7);
}

/* Caption text */
.text{
    color:white;
    font-size:20px;
    position:absolute;
    bottom:30px;
    width:100%;
    text-align:center;
    background:rgba(0,0,0,0.3);
    padding:10px;
}

/* Dots */
.dots{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
}

.dot{
    cursor:pointer;
    height:15px;
    width:15px;
    margin:0 4px;
    background:#bbb;
    border-radius:50%;
    display:inline-block;
    transition:0.3s;
}

.active, .dot:hover{
    background:white;
}

/* Fade animation */
.fade{
    animation:fade 0.6s;
}

@keyframes fade{
    from{opacity:.4}
    to{opacity:1}
}
</style>
</head>
<body>
    <div class="slideshow-container">

  <!-- Full-width images with number and caption text -->
        <div class="mySlides fade">
            <img src="heng.jpg" style="width:100%">
            <div class="text">kaiheng</div>
        </div>

        <div class="mySlides fade">
            <img src="seva.jpg" style="width:100%">
            <div class="text">sevakam</div>
        </div>

        <div class="mySlides fade">
            <img src="theana.jpg" style="width:100%">
            <div class="text">god of everything</div>
        </div>

        <div class="mySlides fade">
            <img src="timor.jpg" style="width:100%">
            <div class="text">king goon</div>
        </div>
        <div class="mySlides fade">
            <img src="duo.jpg" style="width:100%">
            <div class="text">The best duo</div>
        </div>
        <div class="mySlides fade">
            <img src="sotheanaCute.jpg" style="width:100%">
            <div class="text">Cute ot</div>
        </div>
        <div class="mySlides fade">
            <img src="photo.jpg" style="width:100%">
            <div class="text">Bert mort ng hah</div>
        </div>
  <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <br>

<!-- The dots/circles -->
    <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
        <span class="dot" onclick="currentSlide(5)"></span>
        <span class="dot" onclick="currentSlide(6)"></span>
        <span class="dot" onclick="currentSlide(7)"></span>
    </div>
<script>
let slideIndex = 0;
showSlides();

function showSlides() {
    let i;
    let slides = document.getElementsByClassName("mySlides");
    let dots = document.getElementsByClassName("dot");

    for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }

    slideIndex++;

    if (slideIndex > slides.length) {
        slideIndex = 1;
    }

    for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
    }

    slides[slideIndex - 1].style.display = "block";
    dots[slideIndex - 1].className += " active";

    setTimeout(showSlides, 1000); // Change image every 3 seconds
}

/* Manual controls */
function plusSlides(n) {
    slideIndex += n - 1;
    showSlides();
}

function currentSlide(n) {
    slideIndex = n - 1;
    showSlides();
}
</script>
</body>
</html>
